<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Ledger — PRIMUS Usage Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@6..72,600&family=Public+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- ⚙ Deployment URLs — inlined directly so this page works in any
       Vercel deployment topology (single project, separate project, local).
       To update URLs, change BACKEND_URL below AND in pages/js/config.js. -->
  <script>
  var CONFIG = { BACKEND_URL: "https://primus-lyq1.onrender.com", LEDGER_URL: "https://primus-ledger.vercel.app" };
  window.PRIMUS_CONFIG = CONFIG;
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --abyss: #0a1512;
      --vellum: #12211c;
      --bioglow: #3fe8b0;
      --bone: #ede6d6;
      --sage: #8fa69a;
      --rust-amber: #c97b3d;
      --subtle-blue: #6fa8dc;

      --font-fraunces: "Fraunces", serif;
      --font-sans: "Public Sans", system-ui, sans-serif;
      --font-mono: "IBM Plex Mono", monospace;
    }

    html {
      background-color: var(--abyss);
      color: var(--bone);
      font-family: var(--font-sans);
    }

    body {
      background-color: var(--abyss);
      color: var(--bone);
      line-height: 1.5;
      padding: 2rem;
    }

    @media (max-width: 768px) {
      body {
        padding: 1.5rem 1rem;
      }
    }

    /* Header */
    .header {
      margin-bottom: 3rem;
    }

    .header-title {
      font-family: var(--font-fraunces);
      font-size: 2.5rem;
      font-weight: 600;
      color: var(--bone);
      margin-bottom: 0.5rem;
    }

    .header-subtitle {
      font-family: var(--font-sans);
      font-size: 0.95rem;
      color: var(--sage);
      margin-bottom: 2rem;
    }

    /* Time Range Selector */
    .time-range-selector {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .time-range-btn {
      padding: 0.625rem 1rem;
      border: 1px solid var(--sage);
      background-color: transparent;
      color: var(--sage);
      font-family: var(--font-sans);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      border-radius: 0.25rem;
    }

    .time-range-btn:hover {
      border-color: var(--bioglow);
      color: var(--bioglow);
    }

    .time-range-btn.active {
      background-color: var(--bioglow);
      border-color: var(--bioglow);
      color: var(--abyss);
    }

    .time-range-btn:focus-visible {
      outline: 2px solid var(--bioglow);
      outline-offset: 2px;
    }

    /* Summary Cards */
    .summary-cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.5rem;
      margin-bottom: 3rem;
    }

    @media (max-width: 1024px) {
      .summary-cards {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 640px) {
      .summary-cards {
        grid-template-columns: 1fr;
      }
    }

    .summary-card {
      background-color: var(--vellum);
      border: 1px solid var(--sage);
      padding: 1.5rem;
      border-radius: 0.25rem;
    }

    .summary-card-value {
      font-family: var(--font-mono);
      font-size: 1.875rem;
      font-weight: 500;
      color: var(--bone);
      margin-bottom: 0.75rem;
      line-height: 1;
    }

    .summary-card-value.warning {
      color: var(--rust-amber);
    }

    .summary-card-value.success {
      color: var(--bioglow);
    }

    .summary-card-label {
      font-family: var(--font-sans);
      font-size: 0.8rem;
      color: var(--sage);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Charts Container */
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
      margin-bottom: 3rem;
    }

    @media (max-width: 1200px) {
      .charts-grid {
        grid-template-columns: 1fr;
      }
    }

    .chart-panel {
      background-color: var(--vellum);
      border: 1px solid var(--sage);
      padding: 1.5rem;
      border-radius: 0.25rem;
    }

    .chart-title {
      font-family: var(--font-sans);
      font-size: 1rem;
      font-weight: 600;
      color: var(--bone);
      margin-bottom: 1.25rem;
    }

    .chart-wrapper {
      position: relative;
      height: 280px;
      margin-bottom: 1rem;
    }

    .chart-caption {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--sage);
      text-align: center;
      margin-top: 1rem;
    }

    /* Legend for pie/donut charts */
    .chart-legend {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--sage);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--bone);
    }

    .legend-color {
      width: 12px;
      height: 12px;
      border-radius: 0.125rem;
      flex-shrink: 0;
    }

    .legend-label {
      flex: 1;
    }

    .legend-value {
      color: var(--sage);
      margin-left: auto;
    }

    /* Recent Calls Table */
    .table-panel {
      background-color: var(--vellum);
      border: 1px solid var(--sage);
      padding: 1.5rem;
      border-radius: 0.25rem;
      overflow-x: auto;
    }

    .table-title {
      font-family: var(--font-sans);
      font-size: 1rem;
      font-weight: 600;
      color: var(--bone);
      margin-bottom: 1.25rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }

    thead {
      border-bottom: 1px solid var(--sage);
    }

    th {
      text-align: left;
      padding: 0.75rem;
      font-family: var(--font-sans);
      font-weight: 600;
      color: var(--sage);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      user-select: none;
      transition: color 0.2s ease;
    }

    th:hover {
      color: var(--bioglow);
    }

    th.sortable::after {
      content: " ↕";
      opacity: 0.5;
      font-size: 0.75em;
    }

    th.sort-asc::after {
      content: " ↑";
      opacity: 1;
    }

    th.sort-desc::after {
      content: " ↓";
      opacity: 1;
    }

    td {
      padding: 0.75rem;
      border-bottom: 1px solid rgba(143, 166, 154, 0.2);
      font-family: var(--font-mono);
      color: var(--bone);
      font-size: 0.8rem;
    }

    tbody tr:hover {
      background-color: rgba(63, 232, 176, 0.05);
    }

    .status-cell {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-success {
      background-color: var(--bioglow);
    }

    .status-failure {
      background-color: var(--rust-amber);
    }

    .status-label {
      font-family: var(--font-sans);
      font-size: 0.75rem;
      text-transform: uppercase;
    }

    /* Pagination */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-top: 1.5rem;
      font-family: var(--font-mono);
      font-size: 0.8rem;
    }

    .pagination-btn {
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--sage);
      background-color: transparent;
      color: var(--sage);
      cursor: pointer;
      border-radius: 0.25rem;
      transition: all 0.2s ease;
    }

    .pagination-btn:hover:not(:disabled) {
      border-color: var(--bioglow);
      color: var(--bioglow);
    }

    .pagination-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .pagination-btn:focus-visible {
      outline: 2px solid var(--bioglow);
      outline-offset: 2px;
    }

    .pagination-info {
      color: var(--sage);
    }

    /* Utility */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border-width: 0;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <h1 class="header-title">The Ledger</h1>
    <p class="header-subtitle">A record of every call the archive has made.</p>

    <!-- Time Range Selector -->
    <div class="time-range-selector">
      <button class="time-range-btn active" data-range="today">Today</button>
      <button class="time-range-btn" data-range="week">This Week</button>
      <button class="time-range-btn" data-range="month">This Month</button>
      <button class="time-range-btn" data-range="all">All Time</button>
    </div>
  </div>

  <!-- Summary Cards -->
  <div class="summary-cards">
    <div class="summary-card">
      <div class="summary-card-value" id="total-calls">0</div>
      <div class="summary-card-label">Total Calls</div>
    </div>
    <div class="summary-card">
      <div class="summary-card-value" id="total-cost">$0.00</div>
      <div class="summary-card-label">Total Cost</div>
    </div>
    <div class="summary-card">
      <div class="summary-card-value" id="avg-latency">0ms</div>
      <div class="summary-card-label">Avg Latency</div>
    </div>
    <div class="summary-card">
      <div class="summary-card-value" id="success-rate">0%</div>
      <div class="summary-card-label">Success Rate</div>
    </div>
  </div>

  <!-- Charts Grid -->
  <div class="charts-grid">
    <!-- Weekly Call Volume -->
    <div class="chart-panel">
      <h2 class="chart-title">Weekly Call Volume</h2>
      <div class="chart-wrapper">
        <canvas id="volume-chart"></canvas>
      </div>
      <div class="chart-caption" id="volume-caption">—</div>
    </div>

    <!-- Cost by Provider -->
    <div class="chart-panel">
      <h2 class="chart-title">Cost by Provider</h2>
      <div class="chart-wrapper">
        <canvas id="cost-chart"></canvas>
      </div>
      <div class="chart-legend" id="cost-legend"></div>
    </div>
  </div>

  <!-- Calls by Tool & Recent Calls -->
  <div class="charts-grid">
    <!-- Calls by Tool -->
    <div class="chart-panel">
      <h2 class="chart-title">Calls by Tool</h2>
      <div class="chart-wrapper">
        <canvas id="tool-chart"></canvas>
      </div>
      <div class="chart-legend" id="tool-legend"></div>
    </div>

    <!-- Placeholder for balance -->
    <div style="visibility: hidden;"></div>
  </div>

  <!-- Recent Calls Table -->
  <div class="table-panel">
    <h2 class="table-title">Recent Calls</h2>
    <div style="overflow-x: auto;">
      <table>
        <thead>
          <tr>
            <th class="sortable" data-sort="timestamp">Timestamp</th>
            <th class="sortable" data-sort="provider">Provider</th>
            <th class="sortable" data-sort="model">Model</th>
            <th class="sortable" data-sort="tool">Tool</th>
            <th class="sortable" data-sort="tokens">Tokens</th>
            <th class="sortable" data-sort="costUsd">Cost</th>
            <th class="sortable" data-sort="latencyMs">Latency</th>
            <th class="sortable" data-sort="status">Status</th>
          </tr>
        </thead>
        <tbody id="calls-table-body"></tbody>
      </table>
    </div>

    <div class="pagination">
      <button class="pagination-btn" id="prev-page">← Prev</button>
      <span class="pagination-info" id="pagination-info">Page 1</span>
      <button class="pagination-btn" id="next-page">Next →</button>
    </div>
  </div>

  <script>
    /**
     * The Ledger — PRIMUS Usage Dashboard
     * Connects to the live Primus backend for status and job data.
     * Falls back to an empty dataset when the backend is unreachable.
     */

    // ─── Backend base URL ───────────────────────────────────────────────────────
    // Reads CONFIG.BACKEND_URL from pages/js/config.js (single source of truth).
    // No localhost or hardcoded URL may appear anywhere else.
    const API_BASE = (window.PRIMUS_CONFIG || CONFIG).BACKEND_URL.replace(/\/$/, '');

    // ─── Colour palettes (kept from original design) ────────────────────────────
    const PROVIDER_COLORS = {
      anthropic:  '#3fe8b0',
      openrouter: '#c97b3d',
      ollama:     '#8fa69a',
      groq:       '#6fa8dc',
      openai:     '#74b9ff',
      gemini:     '#fdcb6e',
      moonshot:   '#a29bfe',
      glm:        '#fd79a8',
    };

    const TOOL_COLORS = {
      'Web Search':      '#3fe8b0',
      'Memory':          '#c97b3d',
      'File Operations': '#8fa69a',
      'Browser':         '#6fa8dc',
      'Code Execution':  '#3fa699',
      'Calculator':      '#b8956a',
      'terminal':        '#74b9ff',
      'git':             '#a29bfe',
    };

    // ─── Live backend state ──────────────────────────────────────────────────────
    let liveStatus = null;   // /api/status response
    let liveJobs   = [];     // /api/jobs response

    /** Fetch JSON from the backend, returning null on any error. */
    async function apiFetch(path) {
      try {
        const res = await fetch(API_BASE + path, {
          headers: { 'Accept': 'application/json' },
          signal: AbortSignal.timeout(5000),
        });
        if (!res.ok) return null;
        return await res.json();
      } catch (_) {
        return null;
      }
    }

    // ─── Offline banner ──────────────────────────────────────────────────────────
    let _isOffline = false;

    function setOfflineBanner(offline) {
      if (_isOffline === offline) return;  // no change
      _isOffline = offline;
      let banner = document.getElementById('status-banner');
      if (!banner) return;
      if (offline) {
        banner.innerHTML =
          '<span style="color:#c97b3d">⚠ Backend Offline — data may be stale. Retrying automatically…</span>';
      }
      // Online state is handled by renderStatusBanner() when data arrives
    }

    /** Pull fresh data from the backend and refresh every visible panel. */
    async function refreshFromBackend() {
      const [status, jobsData] = await Promise.all([
        apiFetch('/api/status'),
        apiFetch('/api/jobs?limit=500'),
      ]);

      if (!status && !jobsData) {
        setOfflineBanner(true);
        // Keep stale data visible — do not clear charts
        return;
      }

      setOfflineBanner(false);
      liveStatus = status;
      liveJobs   = jobsData ? jobsData.jobs || [] : [];

      renderStatusBanner();
      renderJobsAsCallRecords();
    }

    // ─── Convert jobs → call-record shape for the existing table/chart engine ───
    function jobsToCallRecords(jobs) {
      return jobs.map(j => ({
        id:          j.job_id,
        timestamp:   j.created_at || new Date().toISOString(),
        provider:    liveStatus ? liveStatus.provider : 'unknown',
        model:       liveStatus ? liveStatus.model    : 'unknown',
        tool:        j.name || undefined,
        inputTokens: 0,
        outputTokens: 0,
        costUsd:     0,
        latencyMs:   j.started_at && j.completed_at
          ? new Date(j.completed_at) - new Date(j.started_at)
          : 0,
        status: j.status === 'completed' ? 'success' : 'failure',
      }));
    }

    function renderJobsAsCallRecords() {
      allCalls      = jobsToCallRecords(liveJobs);
      filteredCalls = filterCallsByTimeRange(currentTimeRange);
      updateSummaryCards();
      updateCharts();
      updateRecentCallsTable();
    }

    /** Render (or update) the live-status banner above the header. */
    function renderStatusBanner() {
      let banner = document.getElementById('status-banner');
      if (!banner) {
        banner = document.createElement('div');
        banner.id = 'status-banner';
        banner.style.cssText =
          'font-family:var(--font-mono);font-size:0.8rem;padding:10px 2rem;' +
          'display:flex;gap:2rem;flex-wrap:wrap;border-bottom:1px solid rgba(143,166,154,0.2);' +
          'background:var(--vellum);color:var(--sage);';
        document.body.insertBefore(banner, document.body.firstChild);
      }

      if (!liveStatus) {
        banner.innerHTML =
          '<span style="color:#c97b3d">⚠ Backend Offline — showing cached data. Retrying…</span>';
        return;
      }

      const uptime = Math.round(liveStatus.uptime_seconds || 0);
      const h = Math.floor(uptime / 3600);
      const m = Math.floor((uptime % 3600) / 60);
      const uptimeStr = h > 0 ? `${h}h ${m}m` : `${m}m`;

      const healthColor = liveStatus.health && liveStatus.health.status === 'healthy'
        ? 'var(--bioglow)' : '#c97b3d';

      const startupOk  = liveStatus.startup_done;
      const statusDot  = startupOk
        ? `<span style="color:var(--bioglow)">● READY</span>`
        : `<span style="color:#c97b3d">● STARTING</span>`;

      banner.innerHTML = [
        statusDot,
        `Provider: <span style="color:var(--bone)">${liveStatus.provider || '—'}</span>`,
        `Model: <span style="color:var(--bone)">${liveStatus.model || '—'}</span>`,
        `Memory: <span style="color:var(--bone)">${liveStatus.memory_status || '—'}</span>`,
        `Scheduler: <span style="color:var(--bone)">${liveStatus.scheduler_status || '—'}</span>`,
        `Desktop: <span style="color:var(--bone)">${liveStatus.desktop_status || '—'}</span>`,
        `Health: <span style="color:${healthColor}">${liveStatus.health ? liveStatus.health.status : '—'}</span>`,
        `Uptime: <span style="color:var(--bone)">${uptimeStr}</span>`,
        `v${liveStatus.version || '1'}`,
      ].join(' &nbsp;|&nbsp; ');
    }

    // ─── STATE & FILTERING (unchanged logic, replaces mock bootstrap) ───────────
    let allCalls      = [];
    let filteredCalls = [];
    let currentTimeRange = 'today';
    let currentPage = 1;
    const ROWS_PER_PAGE = 25;
    let currentSort = { field: 'timestamp', direction: 'desc' };

    const TIME_RANGES = {
      today: () => {
        const now = new Date();
        const start = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        return { start, end: now };
      },
      week: () => {
        const now = new Date();
        const start = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
        return { start, end: now };
      },
      month: () => {
        const now = new Date();
        const start = new Date(now.getFullYear(), now.getMonth(), 1);
        return { start, end: now };
      },
      all: () => {
        const start = new Date(2000, 0, 1);
        const now = new Date();
        return { start, end: now };
      }
    };

    /**
     * Filter calls by the selected time range
     */
    function filterCallsByTimeRange(range) {
      const { start, end } = TIME_RANGES[range]();
      return allCalls.filter(call => {
        const callTime = new Date(call.timestamp);
        return callTime >= start && callTime <= end;
      });
    }

    /**
     * Apply sorting to the filtered calls
     */
    function sortCalls(calls, field, direction) {
      const sorted = [...calls];
      sorted.sort((a, b) => {
        let aVal = a[field];
        let bVal = b[field];

        if (field === 'timestamp') {
          aVal = new Date(aVal);
          bVal = new Date(bVal);
        } else if (['tokens', 'costUsd', 'latencyMs'].includes(field)) {
          aVal = Number(aVal) || 0;
          bVal = Number(bVal) || 0;
        } else {
          aVal = String(aVal).toLowerCase();
          bVal = String(bVal).toLowerCase();
        }

        if (aVal < bVal) return direction === 'asc' ? -1 : 1;
        if (aVal > bVal) return direction === 'asc' ? 1 : -1;
        return 0;
      });
      return sorted;
    }

    /**
     * Aggregate statistics for the current filtered set
     */
    function getStats(calls) {
      if (calls.length === 0) {
        return {
          totalCalls: 0,
          totalCost: 0,
          avgLatency: 0,
          successRate: 0,
          callsByDay: {},
          costByProvider: {},
          callsByTool: {}
        };
      }

      let totalCost = 0;
      let totalLatency = 0;
      let successCount = 0;
      const callsByDay = {};
      const costByProvider = {};
      const callsByTool = {};

      calls.forEach(call => {
        totalCost += call.costUsd;
        totalLatency += call.latencyMs;
        if (call.status === 'success') successCount++;

        // By day
        const date = new Date(call.timestamp);
        const dayKey = date.toISOString().split('T')[0];
        callsByDay[dayKey] = (callsByDay[dayKey] || 0) + 1;

        // By provider
        costByProvider[call.provider] = (costByProvider[call.provider] || 0) + call.costUsd;

        // By tool
        if (call.tool) {
          callsByTool[call.tool] = (callsByTool[call.tool] || 0) + 1;
        }
      });

      return {
        totalCalls: calls.length,
        totalCost,
        avgLatency: Math.round(totalLatency / calls.length),
        successRate: ((successCount / calls.length) * 100).toFixed(1),
        callsByDay,
        costByProvider,
        callsByTool
      };
    }

    // ============================================================================
    // DOM UPDATES
    // ============================================================================

    /**
     * Update summary cards with current data
     */
    function updateSummaryCards() {
      const stats = getStats(filteredCalls);

      document.getElementById('total-calls').textContent = stats.totalCalls.toLocaleString();

      document.getElementById('total-cost').textContent = `$${stats.totalCost.toFixed(2)}`;

      document.getElementById('avg-latency').textContent = `${stats.avgLatency}ms`;

      const successRateEl = document.getElementById('success-rate');
      successRateEl.textContent = `${stats.successRate}%`;
      successRateEl.className = 'summary-card-value';
      if (stats.successRate >= 95) {
        successRateEl.classList.add('success');
      } else if (stats.successRate < 90) {
        successRateEl.classList.add('warning');
      }
    }

    /**
     * Format date for display
     */
    function formatDate(isoString) {
      const date = new Date(isoString);
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    /**
     * Format timestamp for table
     */
    function formatTimestamp(isoString) {
      const date = new Date(isoString);
      return date.toLocaleString('en-US', {
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });
    }

    /**
     * Update recent calls table
     */
    function updateRecentCallsTable() {
      const tbody = document.getElementById('calls-table-body');
      tbody.innerHTML = '';

      const sorted = sortCalls(filteredCalls, currentSort.field, currentSort.direction);
      const start = (currentPage - 1) * ROWS_PER_PAGE;
      const end = start + ROWS_PER_PAGE;
      const pageData = sorted.slice(start, end);

      pageData.forEach(call => {
        const row = document.createElement('tr');
        const statusLabel = call.status === 'success' ? 'Success' : 'Failed';
        const statusClass = call.status === 'success' ? 'status-success' : 'status-failure';

        row.innerHTML = `
          <td>${formatTimestamp(call.timestamp)}</td>
          <td>${call.provider}</td>
          <td>${call.model}</td>
          <td>${call.tool || '—'}</td>
          <td>${(call.inputTokens + call.outputTokens).toLocaleString()}</td>
          <td>$${call.costUsd.toFixed(4)}</td>
          <td>${call.latencyMs}ms</td>
          <td>
            <div class="status-cell">
              <span class="status-dot ${statusClass}"></span>
              <span class="status-label">${statusLabel}</span>
            </div>
          </td>
        `;
        tbody.appendChild(row);
      });

      // Update pagination
      const totalPages = Math.ceil(sorted.length / ROWS_PER_PAGE);
      document.getElementById('pagination-info').textContent = `Page ${currentPage} of ${totalPages}`;
      document.getElementById('prev-page').disabled = currentPage === 1;
      document.getElementById('next-page').disabled = currentPage === totalPages;
    }

    /**
     * Update all charts
     */
    function updateCharts() {
      const stats = getStats(filteredCalls);
      updateVolumeChart(stats.callsByDay);
      updateCostChart(stats.costByProvider);
      updateToolChart(stats.callsByTool);
    }

    // ============================================================================
    // CHART SETUP & UPDATES
    // ============================================================================

    let volumeChartInstance, costChartInstance, toolChartInstance;

    /**
     * Chart.js default overrides for token colors
     */
    const chartDefaults = {
      color: '#8fa69a', // sage for text
      borderColor: '#8fa69a',
      backgroundColor: 'rgba(63, 232, 176, 0.1)',
      font: {
        family: "'IBM Plex Mono', monospace"
      }
    };

    /**
     * Initialize volume (bar) chart
     */
    function initVolumeChart() {
      const ctx = document.getElementById('volume-chart').getContext('2d');
      volumeChartInstance = new Chart(ctx, {
        type: 'bar',
        data: { labels: [], datasets: [{ label: 'Calls', data: [], borderRadius: 2 }] },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: 'rgba(18, 33, 28, 0.95)',
              titleColor: '#ede6d6',
              bodyColor: '#ede6d6',
              borderColor: '#8fa69a',
              borderWidth: 1,
              padding: 10,
              titleFont: { family: "'IBM Plex Mono', monospace" },
              bodyFont: { family: "'IBM Plex Mono', monospace" },
              callbacks: {
                label: (ctx) => `${ctx.parsed.y} calls`
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              ticks: { color: '#8fa69a', font: { family: "'IBM Plex Mono', monospace" } },
              grid: { color: 'rgba(143, 166, 154, 0.1)' },
              border: { display: false }
            },
            x: {
              ticks: { color: '#8fa69a', font: { family: "'IBM Plex Mono', monospace" } },
              grid: { display: false },
              border: { display: false }
            }
          }
        }
      });
    }

    /**
     * Update volume chart with new data
     */
    function updateVolumeChart(callsByDay) {
      const days = Object.keys(callsByDay).sort();
      const data = days.map(day => callsByDay[day]);

      const labels = days.map(day => {
        const d = new Date(day);
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      });

      volumeChartInstance.data.labels = labels;
      volumeChartInstance.data.datasets[0].data = data;
      volumeChartInstance.data.datasets[0].backgroundColor = '#3fe8b0';
      volumeChartInstance.data.datasets[0].borderColor = '#3fe8b0';
      volumeChartInstance.update();

      // Update caption
      if (days.length > 0) {
        const totalCalls = data.reduce((a, b) => a + b, 0);
        const startDate = formatDate(days[0]);
        const endDate = formatDate(days[days.length - 1]);
        document.getElementById('volume-caption').textContent =
          `${totalCalls.toLocaleString()} calls — ${startDate} to ${endDate}`;
      }
    }

    /**
     * Initialize cost pie chart
     */
    function initCostChart() {
      const ctx = document.getElementById('cost-chart').getContext('2d');
      costChartInstance = new Chart(ctx, {
        type: 'doughnut',
        data: { labels: [], datasets: [{ data: [], borderColor: '#0a1512', borderWidth: 2 }] },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: 'rgba(18, 33, 28, 0.95)',
              titleColor: '#ede6d6',
              bodyColor: '#ede6d6',
              borderColor: '#8fa69a',
              borderWidth: 1,
              padding: 10,
              titleFont: { family: "'IBM Plex Mono', monospace" },
              bodyFont: { family: "'IBM Plex Mono', monospace" },
              callbacks: {
                label: (ctx) => `$${ctx.parsed}`.slice(0, -3)
              }
            }
          }
        }
      });
    }

    /**
     * Update cost chart with new data
     */
    function updateCostChart(costByProvider) {
      const providers = Object.keys(costByProvider).sort();
      const data = providers.map(p => costByProvider[p]);
      const colors = providers.map(p => PROVIDER_COLORS[p] || '#8fa69a');

      costChartInstance.data.labels = providers;
      costChartInstance.data.datasets[0].data = data;
      costChartInstance.data.datasets[0].backgroundColor = colors;
      costChartInstance.update();

      // Update legend
      const legend = document.getElementById('cost-legend');
      legend.innerHTML = '';
      const totalCost = data.reduce((a, b) => a + b, 0);

      providers.forEach((provider, idx) => {
        const cost = costByProvider[provider];
        const percentage = totalCost > 0 ? ((cost / totalCost) * 100).toFixed(1) : 0;
        const item = document.createElement('div');
        item.className = 'legend-item';
        item.innerHTML = `
          <div class="legend-color" style="background-color: ${colors[idx]}"></div>
          <div class="legend-label">${provider}</div>
          <div class="legend-value">$${cost.toFixed(2)} (${percentage}%)</div>
        `;
        legend.appendChild(item);
      });
    }

    /**
     * Initialize tool bar chart
     */
    function initToolChart() {
      const ctx = document.getElementById('tool-chart').getContext('2d');
      toolChartInstance = new Chart(ctx, {
        type: 'bar',
        data: { labels: [], datasets: [{ label: 'Calls', data: [], borderRadius: 2 }] },
        options: {
          indexAxis: 'y',
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: 'rgba(18, 33, 28, 0.95)',
              titleColor: '#ede6d6',
              bodyColor: '#ede6d6',
              borderColor: '#8fa69a',
              borderWidth: 1,
              padding: 10,
              titleFont: { family: "'IBM Plex Mono', monospace" },
              bodyFont: { family: "'IBM Plex Mono', monospace" },
              callbacks: {
                label: (ctx) => `${ctx.parsed.x} calls`
              }
            }
          },
          scales: {
            x: {
              beginAtZero: true,
              ticks: { color: '#8fa69a', font: { family: "'IBM Plex Mono', monospace" } },
              grid: { color: 'rgba(143, 166, 154, 0.1)' },
              border: { display: false }
            },
            y: {
              ticks: { color: '#8fa69a', font: { family: "'IBM Plex Mono', monospace" } },
              grid: { display: false },
              border: { display: false }
            }
          }
        }
      });
    }

    /**
     * Update tool chart with new data
     */
    function updateToolChart(callsByTool) {
      const tools = Object.keys(callsByTool).sort();
      const data = tools.map(tool => callsByTool[tool]);
      const colors = tools.map(tool => TOOL_COLORS[tool] || '#8fa69a');

      toolChartInstance.data.labels = tools;
      toolChartInstance.data.datasets[0].data = data;
      toolChartInstance.data.datasets[0].backgroundColor = colors;
      toolChartInstance.data.datasets[0].borderColor = colors;
      toolChartInstance.update();

      // Update legend
      const legend = document.getElementById('tool-legend');
      legend.innerHTML = '';
      const totalCalls = data.reduce((a, b) => a + b, 0);

      tools.forEach((tool, idx) => {
        const count = callsByTool[tool];
        const percentage = totalCalls > 0 ? ((count / totalCalls) * 100).toFixed(1) : 0;
        const item = document.createElement('div');
        item.className = 'legend-item';
        item.innerHTML = `
          <div class="legend-color" style="background-color: ${colors[idx]}"></div>
          <div class="legend-label">${tool}</div>
          <div class="legend-value">${count} (${percentage}%)</div>
        `;
        legend.appendChild(item);
      });
    }

    // ============================================================================
    // EVENT LISTENERS
    // ============================================================================

    document.addEventListener('DOMContentLoaded', () => {
      // Initialize charts
      initVolumeChart();
      initCostChart();
      initToolChart();

      // Time range selector
      document.querySelectorAll('.time-range-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.time-range-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentTimeRange = btn.dataset.range;
          currentPage = 1;
          filteredCalls = filterCallsByTimeRange(currentTimeRange);
          updateSummaryCards();
          updateCharts();
          updateRecentCallsTable();
        });
      });

      // Table sorting
      document.querySelectorAll('th.sortable').forEach(th => {
        th.addEventListener('click', () => {
          const field = th.dataset.sort;
          document.querySelectorAll('th').forEach(h => h.classList.remove('sort-asc', 'sort-desc'));
          if (currentSort.field === field) {
            currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
          } else {
            currentSort.field = field;
            currentSort.direction = 'desc';
          }
          th.classList.add(`sort-${currentSort.direction}`);
          currentPage = 1;
          updateRecentCallsTable();
        });
      });

      // Pagination
      document.getElementById('prev-page').addEventListener('click', () => {
        if (currentPage > 1) {
          currentPage--;
          updateRecentCallsTable();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      });

      document.getElementById('next-page').addEventListener('click', () => {
        const sorted = sortCalls(filteredCalls, currentSort.field, currentSort.direction);
        const totalPages = Math.ceil(sorted.length / ROWS_PER_PAGE);
        if (currentPage < totalPages) {
          currentPage++;
          updateRecentCallsTable();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      });

      // Initial backend fetch + empty-state render
      updateSummaryCards();
      updateCharts();
      updateRecentCallsTable();

      // Live backend refresh — first load immediately, then every 15 s.
      // If the backend is unreachable the banner shows "Backend Offline"
      // and the page keeps the last known data. Recovery is automatic.
      refreshFromBackend();
      setInterval(refreshFromBackend, 15000);
    });
  </script>
</body>
</html>
